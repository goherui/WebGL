<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACCESS GRANTED - FUTURE LAB</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Orbitron', sans-serif;
            background: #000;
            color: #fff;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* 动态网格背景 */
        .grid-bg {
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(rgba(45, 212, 191, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(45, 212, 191, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 20s linear infinite;
            pointer-events: none;
        }

        @keyframes gridMove {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(50px); }
        }

        /* 扫描线 */
        .scan-line {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #2dd4bf, transparent);
            box-shadow: 0 0 20px #2dd4bf;
            animation: scan 3s linear infinite;
            z-index: 100;
            pointer-events: none;
        }

        @keyframes scan {
            0% { top: -2px; }
            100% { top: 100vh; }
        }

        /* 粒子效果 */
        .particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: rgba(45, 212, 191, 0.5);
            border-radius: 50%;
            animation: float 10s infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
        }

        /* 状态栏 */
        .status-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 40px;
            background: linear-gradient(90deg, rgba(45, 212, 191, 0.1), transparent);
            border-bottom: 1px solid rgba(45, 212, 191, 0.2);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            font-family: 'Rajdhani', monospace;
            font-size: 12px;
            letter-spacing: 2px;
            z-index: 10;
        }

        .status-left {
            display: flex;
            align-items: center;
            gap: 20px;
            color: rgba(255, 255, 255, 0.5);
        }

        .status-right {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #10b981;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background: #10b981;
            border-radius: 50%;
            box-shadow: 0 0 10px #10b981;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* 主容器 */
        .container {
            position: relative;
            z-index: 2;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 40px 120px;
        }

        /* 访问 granted 文字 */
        .access-text {
            font-family: 'Rajdhani', sans-serif;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 8px;
            color: #10b981;
            margin-bottom: 30px;
            opacity: 0;
            animation: fadeIn 1s ease forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* 用户卡片 - 六边形设计 */
        .user-hex {
            position: relative;
            width: 200px;
            height: 230px;
            margin-bottom: 40px;
            opacity: 0;
            animation: slideUp 1s ease 0.3s forwards;
        }

        @keyframes slideUp {
            from { 
                opacity: 0; 
                transform: translateY(30px); 
            }
            to { 
                opacity: 1; 
                transform: translateY(0); 
            }
        }

        .hex-bg {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(45, 212, 191, 0.2), rgba(168, 85, 247, 0.2));
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            border: 1px solid rgba(45, 212, 191, 0.3);
        }

        .hex-content {
            position: absolute;
            inset: 10px;
            background: rgba(0, 0, 0, 0.8);
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .user-avatar {
            font-size: 64px;
            font-weight: 900;
            background: linear-gradient(135deg, #2dd4bf, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .user-id {
            font-family: 'Rajdhani', monospace;
            font-size: 10px;
            letter-spacing: 3px;
            color: rgba(255, 255, 255, 0.4);
        }

        /* 用户名 */
        .username {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 4px;
            margin-bottom: 15px;
            opacity: 0;
            animation: slideUp 1s ease 0.5s forwards;
            background: linear-gradient(135deg, #fff, #2dd4bf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* 角色标签 */
        .role-tag {
            font-family: 'Rajdhani', sans-serif;
            font-size: 12px;
            letter-spacing: 4px;
            color: rgba(255, 255, 255, 0.4);
            padding: 8px 20px;
            border: 1px solid rgba(45, 212, 191, 0.3);
            margin-bottom: 50px;
            opacity: 0;
            animation: slideUp 1s ease 0.7s forwards;
        }

        /* 操作按钮组 */
        .actions {
            display: flex;
            gap: 20px;
            opacity: 0;
            animation: slideUp 1s ease 0.9s forwards;
        }

        .btn {
            padding: 16px 40px;
            font-family: 'Orbitron', sans-serif;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 3px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: linear-gradient(135deg, #2dd4bf, #3b82f6);
            color: #000;
            border: none;
            clip-path: polygon(10% 0%, 100% 0%, 90% 100%, 0% 100%);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 40px rgba(45, 212, 191, 0.4);
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }

        .btn-primary:hover::before {
            left: 100%;
        }

        .btn-secondary {
            background: transparent;
            color: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.2);
            clip-path: polygon(10% 0%, 100% 0%, 90% 100%, 0% 100%);
        }

        .btn-secondary:hover {
            border-color: rgba(239, 68, 68, 0.5);
            color: #ef4444;
        }

        /* 底部信息 */
        .footer-info {
            position: fixed;
            bottom: 30px;
            left: 30px;
            font-family: 'Rajdhani', monospace;
            font-size: 11px;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.3);
            z-index: 10;
        }

        /* 装饰线条 */
        .deco-line {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 100px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(45, 212, 191, 0.5));
            z-index: 10;
        }

        /* 加载遮罩 */
        .loading-overlay {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.5s;
        }

        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-hex {
            width: 80px;
            height: 92px;
            background: linear-gradient(135deg, #2dd4bf, #3b82f6);
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: rotate 2s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes rotate {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            font-family: 'Rajdhani', monospace;
            font-size: 12px;
            letter-spacing: 4px;
            color: rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <div class="scan-line"></div>
    <div class="particles" id="particles"></div>
    
    <div class="status-bar">
        <div class="status-left">
            <span>FUTURE LABORATORY</span>
            <span>|</span>
            <span>SECURE CONNECTION</span>
        </div>
        <div class="status-right">
            <div class="status-dot"></div>
            <span>ONLINE</span>
        </div>
    </div>

    <div class="container">
        <div class="access-text">>> ACCESS GRANTED</div>
        
        <div class="user-hex">
            <div class="hex-bg"></div>
            <div class="hex-content">
                <div class="user-avatar" id="userAvatar">?</div>
                <div class="user-id">USER_ID: <span id="userId">--</span></div>
            </div>
        </div>

        <div class="username" id="username">OPERATOR</div>
        <div class="role-tag">LEVEL 1 CLEARANCE</div>

        <div class="actions">
            <button class="btn btn-primary" id="enterBtn">
                ENTER LAB
            </button>
            <button class="btn btn-secondary" id="logoutBtn">
                TERMINATE
            </button>
        </div>
    </div>

    <div class="footer-info">
        SYSTEM v2.0.1 | PROTOCOL: ENCRYPTED
    </div>
    <div class="deco-line"></div>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-hex"></div>
        <div class="loading-text">AUTHENTICATING...</div>
    </div>

    <script src="/static/js/auth.js"></script>
    <script>
        // 创建粒子
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 20; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 10 + 's';
                particle.style.animationDuration = (10 + Math.random() * 10) + 's';
                container.appendChild(particle);
            }
        }

        document.addEventListener('DOMContentLoaded', async function() {
            createParticles();
            
            const overlay = document.getElementById('loadingOverlay');
            
            try {
                const user = await checkAuth();
                if (!user) {
                    window.location.href = '/';
                    return;
                }

                const initial = user.username ? user.username[0].toUpperCase() : '?';
                document.getElementById('userAvatar').textContent = initial;
                document.getElementById('username').textContent = user.username.toUpperCase();
                document.getElementById('userId').textContent = Math.random().toString(36).substr(2, 6).toUpperCase();

                setTimeout(() => {
                    overlay.classList.add('hidden');
                }, 800);

                document.getElementById('enterBtn').addEventListener('click', function() {
                    window.location.href = '/lab';
                });

                document.getElementById('logoutBtn').addEventListener('click', handleLogout);

            } catch (error) {
                console.error('验证失败:', error);
                window.location.href = '/';
            }
        });
    </script>
</body>
</html>
