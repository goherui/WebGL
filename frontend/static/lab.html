<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FUTURE LAB</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000000; }
        #content-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
        #title-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; }
        #main-title { font-family: 'Orbitron', monospace; font-size: clamp(4rem, 15vw, 12rem); font-weight: 900; color: transparent; background: linear-gradient(135deg, #00f5ff 0%, #7b2cbf 50%, #ff0080 100%); background-clip: text; -webkit-background-clip: text; text-shadow: 0 0 100px rgba(0, 245, 255, 0.5); letter-spacing: 0.1em; }
        #subtitle { font-family: 'Roboto Mono', monospace; font-size: clamp(0.8rem, 2vw, 1.5rem); color: rgba(255, 255, 255, 0.6); letter-spacing: 0.3em; margin-top: 1rem; }
        #nav-hud { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 2rem; font-family: 'Roboto Mono', monospace; font-size: 0.8rem; letter-spacing: 0.2em; }
        .nav-item { color: rgba(255, 255, 255, 0.4); cursor: pointer; transition: all 0.3s ease-out; pointer-events: auto; }
        .nav-item:hover { color: #00f5ff; text-shadow: 0 0 20px rgba(0, 245, 255, 0.8); }
        #status-indicator { position: absolute; top: 20px; right: 20px; display: flex; align-items: center; gap: 10px; font-family: 'Roboto Mono', monospace; font-size: 0.7rem; color: rgba(255, 255, 255, 0.5); }
        #status-dot { width: 8px; height: 8px; background: #00ff88; border-radius: 50%; box-shadow: 0 0 10px rgba(0, 255, 136, 0.5); }
        .scan-line { position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: linear-gradient(90deg, transparent, rgba(0, 245, 255, 0.3), transparent); animation: scan 4s linear infinite; pointer-events: none; }
        @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }
        #user-info { position: absolute; top: 20px; left: 20px; font-family: 'Roboto Mono', monospace; font-size: 0.7rem; color: rgba(0, 245, 255, 0.7); letter-spacing: 0.1em; }
        .loading { position: fixed; inset: 0; background: #000000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.8s ease; }
        .loading.hidden { opacity: 0; pointer-events: none; }
        .loading-ring { width: 50px; height: 50px; border: 2px solid rgba(0, 245, 255, 0.1); border-top-color: #00f5ff; border-radius: 50%; animation: loadingSpin 1.5s linear infinite; }
        @keyframes loadingSpin { to { transform: rotate(360deg); } }
        /* System Settings Page */
        #system-settings { position: fixed; inset: 0; background: #000000; z-index: 200; display: none; flex-direction: column; }
        #system-settings.active { display: flex; }
        #settings-header { position: relative; padding: 20px; border-bottom: 1px solid rgba(0, 245, 255, 0.1); }
        #back-btn { position: absolute; top: 20px; left: 20px; font-family: 'Roboto Mono', monospace; font-size: 0.7rem; color: rgba(0, 245, 255, 0.7); cursor: pointer; pointer-events: auto; transition: all 0.3s ease-out; letter-spacing: 0.15em; padding: 6px 12px; border: 1px solid rgba(0, 245, 255, 0.3); border-radius: 4px; }
        #back-btn:hover { color: #00f5ff; border-color: #00f5ff; box-shadow: 0 0 15px rgba(0, 245, 255, 0.4); }
        #settings-title { text-align: center; font-family: 'Orbitron', monospace; font-size: 1.5rem; color: #00f5ff; letter-spacing: 0.2em; }
        #settings-content { flex: 1; padding: 40px; overflow-y: auto; }
        .settings-section { margin-bottom: 40px; }
        .settings-section-title { font-family: 'Roboto Mono', monospace; font-size: 0.9rem; color: rgba(255, 255, 255, 0.8); letter-spacing: 0.1em; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid rgba(0, 245, 255, 0.1); }
        .settings-item { display: flex; align-items: center; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .settings-item-label { font-family: 'Roboto Mono', monospace; font-size: 0.8rem; color: rgba(255, 255, 255, 0.6); letter-spacing: 0.1em; }
        .settings-item-value { font-family: 'Roboto Mono', monospace; font-size: 0.8rem; color: #00f5ff; letter-spacing: 0.05em; }
        #settings-logout-btn { margin-top: 40px; width: 100%; padding: 15px; font-family: 'Roboto Mono', monospace; font-size: 0.8rem; color: rgba(239, 68, 68, 0.8); background: transparent; border: 1px solid rgba(239, 68, 68, 0.3); border-radius: 4px; cursor: pointer; pointer-events: auto; transition: all 0.3s ease-out; letter-spacing: 0.15em; }
        #settings-logout-btn:hover { color: #ef4444; border-color: #ef4444; box-shadow: 0 0 15px rgba(239, 68, 68, 0.4); }
        .page-transition { transition: opacity 0.4s ease, transform 0.4s ease; }
        .page-hidden { opacity: 0; transform: translateY(20px); pointer-events: none; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Roboto+Mono:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="loading" id="loading">
        <div class="loading-ring"></div>
    </div>
    
    <!-- Main Page -->
    <div id="content-overlay" class="page-transition">
        <div class="scan-line"></div>
        <div id="user-info">USER: <span id="username">GUEST</span></div>
        <div id="title-container">
            <h1 id="main-title">FUTURE</h1>
            <p id="subtitle">LABORATORY</p>
        </div>
        <div id="nav-hud">
            <div class="nav-item">INIT</div>
            <div class="nav-item">EXPLORE</div>
            <div class="nav-item">ANALYZE</div>
            <div class="nav-item" id="system-nav">SYSTEM</div>
        </div>
        <div id="status-indicator">
            <div id="status-dot"></div>
            <span>SYSTEM ONLINE</span>
        </div>
    </div>

    <!-- System Settings Page -->
    <div id="system-settings">
        <div class="scan-line"></div>
        <div id="settings-header">
            <div id="back-btn">← BACK</div>
            <h2 id="settings-title">SYSTEM SETTINGS</h2>
        </div>
        <div id="settings-content">
            <div class="settings-section">
                <div class="settings-section-title">ACCOUNT</div>
                <div class="settings-item">
                    <span class="settings-item-label">USERNAME</span>
                    <span class="settings-item-value" id="settings-username">GUEST</span>
                </div>
                <div class="settings-item">
                    <span class="settings-item-label">STATUS</span>
                    <span class="settings-item-value" style="color: #00ff88;">AUTHENTICATED</span>
                </div>
            </div>
            <div class="settings-section">
                <div class="settings-section-title">SYSTEM</div>
                <div class="settings-item">
                    <span class="settings-item-label">VERSION</span>
                    <span class="settings-item-value">1.0.0</span>
                </div>
                <div class="settings-item">
                    <span class="settings-item-label">STATUS</span>
                    <span class="settings-item-value" style="color: #00ff88;">ONLINE</span>
                </div>
            </div>
            <div class="settings-section">
                <div class="settings-section-title">SESSION</div>
                <div class="settings-item">
                    <span class="settings-item-label">LOGIN TIME</span>
                    <span class="settings-item-value" id="login-time">--:--:--</span>
                </div>
            </div>
            <button id="settings-logout-btn">LOGOUT</button>
        </div>
    </div>

    <script src="/static/js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            var loadingEl = document.getElementById('loading');
            
            try {
                var user = null;
                try {
                    user = await checkAuth();
                } catch (e) {
                    user = { username: 'GUEST' };
                }

                if (!user) {
                    loadingEl.innerHTML = '<div style="color:#ef4444;font-family:Roboto Mono">NOT AUTHENTICATED</div>';
                    setTimeout(() => window.location.href = '/', 1500);
                    return;
                }

                document.getElementById('username').textContent = user.username.toUpperCase();
                document.getElementById('settings-username').textContent = user.username.toUpperCase();
                document.getElementById('login-time').textContent = new Date().toLocaleTimeString();
                
                document.getElementById('settings-logout-btn').addEventListener('click', handleLogout);
                
                setTimeout(() => loadingEl.classList.add('hidden'), 500);

            } catch (error) {
                loadingEl.innerHTML = '<div style="color:#ef4444;font-family:Roboto Mono">ERROR: ' + error.message + '</div>';
            }
        });

        // System navigation
        document.getElementById('system-nav').addEventListener('click', function() {
            document.getElementById('content-overlay').classList.add('page-hidden');
            setTimeout(() => {
                document.getElementById('system-settings').classList.add('active');
            }, 200);
        });

        // Back navigation
        document.getElementById('back-btn').addEventListener('click', function() {
            document.getElementById('system-settings').classList.remove('active');
            setTimeout(() => {
                document.getElementById('content-overlay').classList.remove('page-hidden');
            }, 100);
        });
    </script>
</body>
</html>
